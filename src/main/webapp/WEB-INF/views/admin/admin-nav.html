<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-brand" href="<%=request.getContextPath()%>/dashboard/">MyBlog</a>
    <span class="topbar-section">Admin</span>
    <nav class="topbar-nav">
      <a href="<%=request.getContextPath()%>/admin/"
         class="<%=request.getPathInfo()==null||request.getPathInfo().equals("/")||request.getPathInfo().startsWith("/users")?"active":""%>">Benutzer</a>
      <a href="<%=request.getContextPath()%>/admin/blogs/"
         class="<%=request.getPathInfo()!=null&&request.getPathInfo().startsWith("/blogs")?"active":""%>">Blogs</a>
    </nav>
  </div>
  <span class="topbar-user">
    <%=session.getAttribute("displayName")%>
    <a href="<%=request.getContextPath()%>/dashboard/">Dashboard</a>
  </span>
</div>
